<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Good Night Àñveshä 🌙</title>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
font-family:Arial, sans-serif;
background:linear-gradient(to top,#0f2027,#203a43,#2c5364);
display:flex;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

/* moon */

.moon{
position:absolute;
top:60px;
right:40px;
width:70px;
height:70px;
background:#fff9c4;
border-radius:50%;
box-shadow:0 0 40px #fff9c4;
}

/* stars */

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
opacity:0.9;
transition:all 3s ease;
}

/* BIG shooting star */

.shooting-star{
position:absolute;
top:0;
left:0;
width:10px;
height:10px;
background:white;
border-radius:50%;
box-shadow:
0 0 10px white,
0 0 20px white,
0 0 40px white;
animation:shoot 1.5s linear forwards;
}

/* tail */

.shooting-star::after{
content:"";
position:absolute;
top:4px;
left:-220px;
width:220px;
height:4px;
background:linear-gradient(90deg, rgba(255,255,255,0.9), rgba(255,255,255,0));
}

/* animation */

@keyframes shoot{

0%{
transform:translate(-200px,0);
opacity:1;
}

100%{
transform:translate(140vw,320px);
opacity:0;
}

}

/* message */

.message{
position:absolute;
bottom:120px;
opacity:0;
transition:opacity 2s ease;
max-width:260px;
padding:0 20px;
}

.title{
font-size:24px;
margin-bottom:10px;
}

.text{
font-size:17px;
line-height:1.5;
}

</style>

</head>

<body>

<div class="moon"></div>

<div class="message" id="msg">
<div class="title">Good Night Àñveshä 🌙</div>

<div class="text">
Even the stars want you to feel better tonight ✨<br><br>
Sleep well and wake up smiling tomorrow.
</div>

</div>

<script>

/* background stars */

let stars=[]
let total=90

for(let i=0;i<total;i++){

let star=document.createElement("div")
star.className="star"

star.style.left=Math.random()*100+"vw"
star.style.top=Math.random()*100+"vh"

document.body.appendChild(star)
stars.push(star)

}

/* bigger shooting star */

setTimeout(()=>{

let shoot=document.createElement("div")
shoot.className="shooting-star"

shoot.style.top="120px"
shoot.style.left="-200px"

document.body.appendChild(shoot)

},1500)

/* heart function */

function heart(t){

let x=16*Math.pow(Math.sin(t),3)
let y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)

return {x,y}

}

/* stars form heart */

setTimeout(()=>{

let heartStars=40

for(let i=0;i<heartStars;i++){

let t=(Math.PI*2/heartStars)*i
let pos=heart(t)

let x=window.innerWidth/2 + pos.x*8
let y=window.innerHeight/2 - pos.y*8

stars[i].style.left=x+"px"
stars[i].style.top=y+"px"

}

},4000)

/* show message */

setTimeout(()=>{

document.getElementById("msg").style.opacity=1

},6500)

</script>

</body>
</html>
