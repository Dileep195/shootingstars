<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Good Night Àñveshä 🌙</title>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
font-family:Arial, sans-serif;
background:linear-gradient(to top,#0f2027,#203a43,#2c5364);
display:flex;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

/* moon */

.moon{
position:absolute;
top:70px;
right:40px;
width:75px;
height:75px;
background:#fff9c4;
border-radius:50%;
box-shadow:
0 0 30px #fff9c4,
0 0 60px #fff9c4,
0 0 90px #fff9c4;
}

/* stars */

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
opacity:0.9;
transition:all 3s ease;
}

/* bright shooting star */

.shooting-star{
position:absolute;
top:120px;
left:-250px;
width:12px;
height:12px;
background:white;
border-radius:50%;
box-shadow:
0 0 15px white,
0 0 30px white,
0 0 60px white;
animation:shoot 1.4s linear forwards;
}

/* tail */

.shooting-star::after{
content:"";
position:absolute;
top:5px;
left:-260px;
width:260px;
height:5px;
background:linear-gradient(90deg,
rgba(255,255,255,1),
rgba(255,255,255,0));
}

/* shooting animation */

@keyframes shoot{

0%{
transform:translate(-200px,0);
opacity:1;
}

100%{
transform:translate(140vw,320px);
opacity:0;
}

}

/* message */

.message{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
opacity:0;
transition:opacity 2s ease;
max-width:260px;
padding:0 20px;
}

.title{
font-size:26px;
margin-bottom:10px;
}

.text{
font-size:17px;
line-height:1.5;
}

</style>

</head>

<body>

<div class="moon"></div>

<div class="message" id="msg">

<div class="title">Good Night Àñveshä 🌙</div>

<div class="text">
Even the stars want you to feel better tonight ✨<br><br>
Sleep well and wake up smiling tomorrow.
</div>

</div>

<script>

/* create stars */

let stars=[]
let total=100

for(let i=0;i<total;i++){

let star=document.createElement("div")
star.className="star"

star.style.left=Math.random()*100+"vw"
star.style.top=Math.random()*100+"vh"

document.body.appendChild(star)
stars.push(star)

}

/* shooting star */

setTimeout(()=>{

let shoot=document.createElement("div")
shoot.className="shooting-star"

document.body.appendChild(shoot)

},1200)

/* heart function */

function heart(t){

let x=16*Math.pow(Math.sin(t),3)
let y=13*Math.cos(t)
-5*Math.cos(2*t)
-2*Math.cos(3*t)
-Math.cos(4*t)

return {x,y}

}

/* form heart */

setTimeout(()=>{

let heartStars=40

for(let i=0;i<heartStars;i++){

let t=(Math.PI*2/heartStars)*i
let pos=heart(t)

let x=window.innerWidth/2 + pos.x*9
let y=window.innerHeight/2 - pos.y*9

stars[i].style.left=x+"px"
stars[i].style.top=y+"px"

}

},3500)

/* show message */

setTimeout(()=>{

document.getElementById("msg").style.opacity=1

},5500)

</script>

</body>
</html>
